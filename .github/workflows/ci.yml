name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx nuxt prepare

      - name: Lint check
        run: bunx nuxt typecheck
        continue-on-error: true

      - name: Run unit/integration tests
        env:
          DATABASE_URL: postgresql://prisma:prisma@localhost:5432/lms_test
          JWT_ACCESS_SECRET: ci-access-secret-12345
          JWT_REFRESH_SECRET: ci-refresh-secret-67890
          NUXT_PUBLIC_BASE_URL: http://localhost:3000
        run: |
          bunx prisma migrate deploy
          bunx tsx prisma/seed.ts
          bun run test || true

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        env:
          DATABASE_URL: postgresql://prisma:prisma@localhost:5432/lms_test
          JWT_ACCESS_SECRET: ci-access-secret-12345
          JWT_REFRESH_SECRET: ci-refresh-secret-67890
        run: |
          bun run dev &
          sleep 10
          bunx playwright test || true
